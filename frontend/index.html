<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas - Iniciar Sesion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/global.css">
</head>
<body class="bg-light">
    <div id="app" class="min-vh-100 d-flex align-items-center justify-content-center p-3">
        <div class="card shadow-sm" style="max-width: 400px; width: 100%;">
            <div class="card-body p-4">
                <h2 class="fw-bold mb-1">Sistema de Notas</h2>
                <p class="text-muted mb-4">Inicia sesion para continuar</p>

                <div v-if="error" class="alert alert-danger py-2">{{ error }}</div>

                <form @submit.prevent="login">
                    <div class="mb-3">
                        <label for="correo" class="form-label">Correo electronico</label>
                        <input type="email" id="correo" class="form-control" v-model="correo" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" v-model="password" placeholder="Tu contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" :disabled="loading">
                        <span v-if="loading" class="spinner-border spinner-border-sm me-1"></span>
                        {{ loading ? 'Ingresando...' : 'Iniciar Sesion' }}
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (Auth.isLoggedIn()) {
            Auth.redirectByRol();
        }

        Vue.createApp({
            data() {
                return { correo: '', password: '', error: '', loading: false }
            },
            methods: {
                async login() {
                    this.error = '';
                    if (!this.correo || !this.password) {
                        this.error = 'Completa todos los campos';
                        return;
                    }
                    this.loading = true;
                    try {
                        const result = await Auth.login(this.correo, this.password);
                        if (result) Auth.redirectByRol();
                        else this.error = 'Correo o contraseña incorrectos';
                    } catch (e) {
                        this.error = e.message || 'Error al conectar con el servidor';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
