<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas - Iniciar Sesion</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
        }

        .login-card h1 {
            margin-bottom: 0.25rem;
        }

        .login-card p {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="card login-card">
            <h1>Sistema de Notas</h1>
            <p>Inicia sesion para continuar</p>

            <!-- Alerta de error (oculta por defecto) -->
            <div id="login-error" class="alert alert-error hidden"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="correo">Correo electronico</label>
                    <input
                        type="email"
                        id="correo"
                        class="form-control"
                        placeholder="correo@ejemplo.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="Tu contraseña"
                        required
                    >
                </div>

                <button type="submit" id="btn-login" class="btn btn-primary btn-block mt-2">
                    Iniciar Sesion
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts: api.js primero porque auth.js depende de el -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Si ya hay sesion activa, redirigir al dashboard
        if (Auth.isLoggedIn()) {
            Auth.redirectByRol();
        }

        // Manejar el envio del formulario
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('login-error');
        const btnLogin = document.getElementById('btn-login');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Limpiar error anterior
            errorDiv.classList.add('hidden');

            // Obtener valores
            const correo = document.getElementById('correo').value.trim();
            const password = document.getElementById('password').value;

            // Validacion basica
            if (!correo || !password) {
                showError('Completa todos los campos');
                return;
            }

            // Deshabilitar boton mientras carga
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="loader"></span> Ingresando...';

            try {
                const result = await Auth.login(correo, password);

                if (result) {
                    Auth.redirectByRol();
                } else {
                    showError('Correo o contraseña incorrectos');
                }
            } catch (error) {
                showError(error.message || 'Error al conectar con el servidor');
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = 'Iniciar Sesion';
            }
        });

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
