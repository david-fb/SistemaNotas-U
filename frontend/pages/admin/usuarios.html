<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Sistema de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <div id="app">
        <nav-bar active="usuarios"></nav-bar>

        <div class="container">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="fw-bold mb-0">Gestion de Usuarios</h3>
                <button class="btn btn-primary" @click="openCreate">+ Nuevo Usuario</button>
            </div>

            <!-- Filtros -->
            <div class="row g-2 mb-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Buscar por nombre o correo..." v-model="search">
                </div>
                <div class="col-md-3">
                    <select class="form-select" v-model="filterRol">
                        <option value="">Todos los roles</option>
                        <option value="admin">Admin</option>
                        <option value="profesor">Profesor</option>
                        <option value="estudiante">Estudiante</option>
                    </select>
                </div>
            </div>

            <!-- Tabla -->
            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="u in filteredUsers" :key="u.id">
                                <td>{{ u.id }}</td>
                                <td>{{ u.nombre }}</td>
                                <td>{{ u.correo }}</td>
                                <td><span class="badge" :class="rolBadge(u.rol)">{{ u.rol }}</span></td>
                                <td><span class="badge" :class="u.activo ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'">{{ u.activo ? 'Activo' : 'Inactivo' }}</span></td>
                                <td class="text-end">
                                    <button class="btn btn-sm btn-outline-primary me-1" @click="openEdit(u)">Editar</button>
                                    <button class="btn btn-sm btn-outline-danger" @click="toggleActive(u)">{{ u.activo ? 'Desactivar' : 'Activar' }}</button>
                                </td>
                            </tr>
                            <tr v-if="filteredUsers.length === 0">
                                <td colspan="6" class="text-center text-muted py-4">No se encontraron usuarios</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Modal Crear/Editar -->
        <div class="modal fade" id="modalUsuario" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">{{ editing ? 'Editar Usuario' : 'Nuevo Usuario' }}</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form @submit.prevent="save">
                        <div class="modal-body">
                            <div v-if="formError" class="alert alert-danger py-2">{{ formError }}</div>
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" v-model="form.nombre" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Correo</label>
                                <input type="email" class="form-control" v-model="form.correo" required>
                            </div>
                            <div class="mb-3" v-if="!editing">
                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control" v-model="form.password" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol</label>
                                <select class="form-select" v-model="form.rol" required>
                                    <option value="">Seleccionar rol</option>
                                    <option value="admin">Admin</option>
                                    <option value="profesor">Profesor</option>
                                    <option value="estudiante">Estudiante</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" :disabled="saving">
                                <span v-if="saving" class="spinner-border spinner-border-sm me-1"></span>
                                {{ editing ? 'Guardar Cambios' : 'Crear Usuario' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <footer-bar></footer-bar>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        Auth.requireRol('admin');

        Vue.createApp({
            data() {
                return {
                    users: [],
                    search: '',
                    filterRol: '',
                    form: { nombre: '', correo: '', password: '', rol: '' },
                    editing: false,
                    editingId: null,
                    formError: '',
                    saving: false
                }
            },
            computed: {
                filteredUsers() {
                    return this.users.filter(u => {
                        const matchSearch = !this.search || u.nombre.toLowerCase().includes(this.search.toLowerCase()) || u.correo.toLowerCase().includes(this.search.toLowerCase());
                        const matchRol = !this.filterRol || u.rol === this.filterRol;
                        return matchSearch && matchRol;
                    });
                }
            },
            mounted() {
                this.loadUsers();
            },
            methods: {
                async loadUsers() {
                    try {
                        this.users = await Api.get('/usuarios');
                    } catch (e) {
                        Utils.toast('Error al cargar usuarios', 'danger');
                    }
                },

                openCreate() {
                    this.editing = false;
                    this.editingId = null;
                    this.form = { nombre: '', correo: '', password: '', rol: '' };
                    this.formError = '';
                    new bootstrap.Modal(document.getElementById('modalUsuario')).show();
                },

                openEdit(user) {
                    this.editing = true;
                    this.editingId = user.id;
                    this.form = { nombre: user.nombre, correo: user.correo, password: '', rol: user.rol };
                    this.formError = '';
                    new bootstrap.Modal(document.getElementById('modalUsuario')).show();
                },

                async save() {
                    this.formError = '';
                    this.saving = true;
                    try {
                        if (this.editing) {
                            await Api.put('/usuarios/' + this.editingId, {
                                nombre: this.form.nombre,
                                correo: this.form.correo,
                                rol: this.form.rol
                            });
                            Utils.toast('Usuario actualizado');
                        } else {
                            await Api.post('/usuarios', this.form);
                            Utils.toast('Usuario creado');
                        }
                        bootstrap.Modal.getInstance(document.getElementById('modalUsuario')).hide();
                        await this.loadUsers();
                    } catch (e) {
                        this.formError = e.message;
                    } finally {
                        this.saving = false;
                    }
                },

                async toggleActive(user) {
                    const action = user.activo ? 'desactivar' : 'activar';
                    if (!await Utils.confirm(`¿${action} a ${user.nombre}?`)) return;
                    try {
                        if (user.activo) {
                            await Api.delete('/usuarios/' + user.id);
                        } else {
                            await Api.put('/usuarios/' + user.id, { nombre: user.nombre, correo: user.correo, rol: user.rol, activo: true });
                        }
                        Utils.toast(`Usuario ${action === 'desactivar' ? 'desactivado' : 'activado'}`);
                        await this.loadUsers();
                    } catch (e) {
                        Utils.toast(e.message, 'danger');
                    }
                },

                rolBadge(rol) {
                    const map = { admin: 'bg-purple-subtle text-purple', profesor: 'bg-primary-subtle text-primary', estudiante: 'bg-success-subtle text-success' };
                    return map[rol] || 'bg-secondary-subtle';
                }
            }
        }).component('nav-bar', NavBar).component('footer-bar', FooterBar).mount('#app');
    </script>
</body>
</html>
