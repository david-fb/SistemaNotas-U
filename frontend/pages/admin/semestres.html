<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semestres - Sistema de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/global.css">
</head>
<body class="bg-light">
    <div id="app">
        <nav-bar active="semestres"></nav-bar>

        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="fw-bold mb-0">Semestres</h3>
                <button class="btn btn-primary" @click="openCreate">+ Nuevo Semestre</button>
            </div>

            <!-- Tabla -->
            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Fecha Inicio</th>
                                <th>Fecha Fin</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="s in semestres" :key="s.id">
                                <td>{{ s.id }}</td>
                                <td>{{ s.nombre }}</td>
                                <td>{{ formatDate(s.fechaInicio) }}</td>
                                <td>{{ formatDate(s.fechaFin) }}</td>
                            </tr>
                            <tr v-if="semestres.length === 0">
                                <td colspan="4" class="text-center text-muted py-4">No hay semestres registrados</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Modal Crear -->
        <div class="modal fade" id="modalSemestre" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Nuevo Semestre</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form @submit.prevent="save">
                        <div class="modal-body">
                            <div v-if="formError" class="alert alert-danger py-2">{{ formError }}</div>
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" v-model="form.nombre" placeholder="Ej: 2025-2" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha de Inicio</label>
                                <input type="date" class="form-control" v-model="form.fechaInicio" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha de Fin</label>
                                <input type="date" class="form-control" v-model="form.fechaFin" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary" :disabled="saving">
                                <span v-if="saving" class="spinner-border spinner-border-sm me-1"></span>
                                Crear Semestre
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        Auth.requireRol('admin');

        Vue.createApp({
            data() {
                return {
                    semestres: [],
                    form: { nombre: '', fechaInicio: '', fechaFin: '' },
                    formError: '',
                    saving: false
                }
            },
            mounted() { this.loadData(); },
            methods: {
                async loadData() {
                    try {
                        this.semestres = await Api.get('/semestres');
                    } catch (e) {
                        Utils.toast('Error al cargar semestres', 'danger');
                    }
                },

                openCreate() {
                    this.form = { nombre: '', fechaInicio: '', fechaFin: '' };
                    this.formError = '';
                    new bootstrap.Modal(document.getElementById('modalSemestre')).show();
                },

                async save() {
                    this.formError = '';
                    if (this.form.fechaFin <= this.form.fechaInicio) {
                        this.formError = 'La fecha de fin debe ser posterior a la de inicio';
                        return;
                    }
                    this.saving = true;
                    try {
                        await Api.post('/semestres', this.form);
                        Utils.toast('Semestre creado');
                        bootstrap.Modal.getInstance(document.getElementById('modalSemestre')).hide();
                        await this.loadData();
                    } catch (e) {
                        this.formError = e.message;
                    } finally {
                        this.saving = false;
                    }
                },

                formatDate(d) { return Utils.formatDate(d); }
            }
        }).component('nav-bar', NavBar).mount('#app');
    </script>
</body>
</html>
