<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriculas - Sistema de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/global.css">
</head>

<body class="bg-light">
    <div id="app">
        <nav-bar active="mis-cursos"></nav-bar>

        <div class="container">

            <div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="mb-0">Mis Cursos</h3>
                </div>
                <div class="card shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="c in cursos" :key="c.id">
                                    <td>{{ c.id }}</td>
                                    <td>{{ c.nombre }}</td>
                                    <td class="text-end">
                                        <button class="btn btn-sm btn-outline-primary" @click="verEstudiantes(c.id)">Ver
                                            Estudiantes</button>
                                    </td>
                                </tr>
                                <tr v-if="cursos.length === 0">
                                    <td colspan="3" class="text-center text-muted py-4">No hay cursos registrados</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-- Tabla de estudiantes -->
            <div v-if="selectedCurso" class="mt-4">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0">Estudiantes Matriculados</h5>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Estudiante</th>
                                    <th>Correo</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="m in matriculas" :key="m.id">
                                    <td>{{ m.estudianteId }}</td>
                                    <td>{{ m.nombre }}</td>
                                    <td>{{ m.correo }}</td>
                                </tr>

                                <tr v-if="matriculas.length === 0">
                                    <td colspan="3" class="text-center text-muted">
                                        No hay estudiantes matriculados
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div v-else class="text-center text-muted py-5">
                <p>Selecciona un curso para ver y gestionar sus matriculas</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        Auth.requireRol('profesor');

        Vue.createApp({
            data() {
                return {
                    cursos: [],
                    matriculas: [],
                    selectedCurso: ''
                }
            },
            mounted() { this.loadCursos(); },
            methods: {
                async loadCursos() {
                    try {
                        this.cursos = await Api.get('/mis-cursos');
                    } catch (e) {
                        Utils.toast('Error al cargar cursos', 'danger');
                    }
                },

                async loadMatriculas() {
                    if (!this.selectedCurso) { this.matriculas = []; return; }
                    try {
                        this.matriculas = await Api.get('/matriculas?cursoId=' + this.selectedCurso);
                    } catch (e) {
                        Utils.toast('Error al cargar matriculas', 'danger');
                    }
                },

                async verEstudiantes(cursoId) {
                    this.selectedCurso = cursoId;
                    try {
                        this.matriculas = await Api.get('/matriculas?cursoId=' + cursoId);
                    } catch (e) {
                        Utils.toast('Error al cargar estudiantes', 'danger');
                    }
                },

                findNestedValue(obj, predicate, visited = new Set()) {
                    if (!obj || typeof obj !== 'object' || visited.has(obj)) return null;
                    visited.add(obj);
                    for (const key in obj) {
                        const value = obj[key];
                        if (predicate(key, value)) return value;
                        if (typeof value === 'object') {
                            const nested = this.findNestedValue(value, predicate, visited);
                            if (nested) return nested;
                        }
                    }
                    return null;
                },

                formatDate(d) { return Utils.formatDate(d); }
            }
        }).component('nav-bar', NavBar).mount('#app');
    </script>
</body>

</html>
