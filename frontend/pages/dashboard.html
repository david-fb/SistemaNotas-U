<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body class="bg-light">
    <div id="app">
        <nav-bar></nav-bar>

        <div class="container">
            <div class="greeting-banner shadow-sm">
                <h4 class="fw-bold mb-0">Hola, {{ usuario.nombre }}</h4>
                <p class="text-muted mb-0 mt-1">Selecciona un módulo para comenzar</p>
            </div>

            <div class="row g-3">
                <div v-for="item in menuItems" :key="item.href" class="col-md-6 col-lg-4">
                    <a :href="item.href" class="card-modulo card h-100 shadow-sm" :class="item.hoverClass">
                        <div class="card-body p-4">
                            <i :class="item.icon + ' bg-icon'"></i>
                            <h6 class="fw-bold mb-1 text-dark">{{ item.title }}</h6>
                            <p class="small mb-0 text-muted">{{ item.desc }}</p>
                        </div>
                    </a>
                </div>
            </div>
        </div>
        <footer-bar></footer-bar>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script>
        if (!Auth.requireAuth()) { /* redirige al login */ }

        const m = (title, desc, href, icon, hoverClass) =>
            ({ title, desc, href, icon, hoverClass });

        const menus = {
            admin: [
                m('Gestión de Usuarios', 'Crear, editar y desactivar cuentas de usuario', 'admin/usuarios.html', 'bi bi-people-fill', 'hover-primary'),
                m('Semestres', 'Crear y administrar periodos académicos', 'admin/semestres.html', 'bi bi-calendar3', 'hover-warning'),
                m('Cursos', 'Crear cursos y asignar profesores', 'admin/cursos.html', 'bi bi-book-fill', 'hover-success'),
                m('Matrículas', 'Matricular y desmatricular estudiantes', 'admin/matriculas.html', 'bi bi-person-check-fill', 'hover-info'),
            ],
            profesor: [
                m('Mis Cursos', 'Gestionar cursos y estudiantes matriculados', 'profesor/cursos.html', 'bi bi-book-fill', 'hover-primary'),
                m('Actividades Evaluativas', 'Crear cortes con sus porcentajes', 'profesor/actividades.html', 'bi bi-list-check', 'hover-warning'),
                m('Registro de Notas', 'Registrar y editar calificaciones', 'profesor/notas.html', 'bi bi-pencil-square', 'hover-success'),
            ],
            estudiante: [
                m('Mis Notas', 'Consultar notas por materia y nota definitiva', 'estudiante/mis-notas.html', 'bi bi-bar-chart-fill', 'hover-primary'),
            ]
        };

        Vue.createApp({
            data() {
                return { usuario: Auth.getUsuario() || { nombre: '', rol: '' } }
            },
            computed: {
                menuItems() { return menus[this.usuario.rol] || []; }
            }
        }).component('nav-bar', NavBar).component('footer-bar', FooterBar).mount('#app');
    </script>
</body>
</html>
