<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Notas - Sistema de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/global.css">
</head>
<body class="bg-light">
    <div id="app">
        <nav-bar active="mis-notas"></nav-bar>

        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="fw-bold mb-0">Mis Notas</h3>
                <div v-if="!loading" class="text-end">
                    <div class="text-muted small">Promedio General</div>
                    <div class="fs-3 fw-bold" :class="promedio >= 3.0 ? 'text-success' : 'text-danger'">{{ promedio.toFixed(2) }}</div>
                </div>
            </div>

            <div v-if="loading" class="text-center text-muted py-5">
                <span class="spinner-border spinner-border-sm me-2"></span> Cargando...
            </div>

            <div v-else>
                <div v-if="misNotas.length === 0" class="alert alert-info">
                    Aun no tienes notas registradas.
                </div>

                <div v-for="curso in misNotas" :key="curso.cursoId" class="card shadow-sm mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0">{{ getCursoNombre(curso.cursoId) }}</h5>
                            <div class="d-flex align-items-center gap-2">
                                <span class="fw-bold">Definitiva: {{ curso.definitiva.toFixed(1) }}</span>
                                <span class="badge" :class="curso.estado === 'Aprobado' ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'">
                                    {{ curso.estado }}
                                </span>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-sm table-borderless mb-0">
                                <thead>
                                    <tr class="text-muted small">
                                        <th v-for="(nota, index) in curso.notas" :key="nota.id">Corte {{ index + 1 }}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td v-for="nota in curso.notas" :key="nota.id" class="fw-semibold">{{ nota.valor.toFixed(1) }}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        Auth.requireRol('estudiante');

        Vue.createApp({
            data() {
                return {
                    misNotas: [],
                    promedio: 0,
                    cursos: [],
                    loading: true
                }
            },
            mounted() {
                this.loadDatos();
            },
            methods: {
                async loadDatos() {
                    this.loading = true;
                    try {
                        const [misNotas, promedioRes] = await Promise.all([
                            Api.get('/mis-notas'),
                            Api.get('/mis-notas/promedio')
                        ]);
                        this.misNotas = misNotas;
                        this.promedio = promedioRes.promedio;

                        // Cargar el detalle de cada curso (nombre, codigo)
                        const cursosData = await Promise.all(
                            this.misNotas.map(c => Api.get('/cursos/' + c.cursoId).catch(() => null))
                        );
                        this.cursos = cursosData.filter(c => c !== null);
                    } catch (e) {
                        Utils.toast('Error al cargar tus notas', 'danger');
                    } finally {
                        this.loading = false;
                    }
                },

                getCursoNombre(cursoId) {
                    const c = this.cursos.find(x => x.id === cursoId);
                    return c ? (c.codigo + ' - ' + c.nombre) : 'Curso ID: ' + cursoId;
                }
            }
        }).component('nav-bar', NavBar).mount('#app');
    </script>
</body>
</html>
