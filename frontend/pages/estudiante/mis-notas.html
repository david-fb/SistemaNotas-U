<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Notas - Sistema de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/mis-notas.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <div id="app">
        <nav-bar active="mis-notas"></nav-bar>

        <div class="container" style="max-width: 760px;">

            <div v-if="loading" class="text-center text-muted py-5">
                <span class="spinner-border spinner-border-sm me-2"></span> Cargando...
            </div>

            <div v-else>
                <!-- Banner promedio -->
                <div class="promedio-banner shadow-sm">
                    <div>
                        <div class="label">Promedio General</div>
                        <div class="valor mt-1" :class="promedio >= 3.0 ? 'aprobado' : 'reprobado'">
                            {{ promedio.toFixed(2) }}
                        </div>
                    </div>
                    <i class="bi bi-bar-chart-fill" style="font-size:3rem; opacity:0.2;"></i>
                </div>

                <!-- Sin notas -->
                <div v-if="misNotas.length === 0" class="alert alert-info">
                    Aún no tienes notas registradas.
                </div>

                <!-- Cards de cursos -->
                <div v-for="curso in misNotas" :key="curso.cursoId" class="curso-card card shadow-sm">
                    <div class="curso-header d-flex justify-content-between align-items-center">
                        <div>
                            <div class="curso-codigo">{{ getCursoCodigo(curso.cursoId) }}</div>
                            <p class="curso-nombre">{{ getCursoNombreSolo(curso.cursoId) }}</p>
                        </div>
                        <div class="text-end">
                            <div class="definitiva-num">{{ curso.definitiva.toFixed(1) }}</div>
                            <span class="badge mt-1" :class="curso.estado === 'Aprobado' ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'">
                                {{ curso.estado }}
                            </span>
                        </div>
                    </div>

                    <div class="cortes-row">
                        <div class="corte-chip" v-for="(nota, index) in curso.notas" :key="nota.id">
                            <div class="corte-label">Corte {{ index + 1 }}</div>
                            <div class="corte-valor" :class="nota.valor >= 3.0 ? 'aprobado' : 'reprobado'">
                                {{ nota.valor.toFixed(1) }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer-bar></footer-bar>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        Auth.requireRol('estudiante');

        Vue.createApp({
            data() {
                return { misNotas: [], promedio: 0, cursos: [], loading: true }
            },
            mounted() { this.loadDatos(); },
            methods: {
                async loadDatos() {
                    try {
                        const [misNotas, promedioRes] = await Promise.all([
                            Api.get('/mis-notas'),
                            Api.get('/mis-notas/promedio')
                        ]);
                        this.misNotas = misNotas;
                        this.promedio = promedioRes.promedio;
                        const cursosData = await Promise.all(
                            this.misNotas.map(c => Api.get('/cursos/' + c.cursoId).catch(() => null))
                        );
                        this.cursos = cursosData.filter(c => c !== null);
                    } catch (e) {
                        Utils.toast('Error al cargar tus notas', 'danger');
                    } finally {
                        this.loading = false;
                    }
                },
                getCursoCodigo(cursoId) {
                    const c = this.cursos.find(x => x.id === cursoId);
                    return c ? c.codigo : '';
                },
                getCursoNombreSolo(cursoId) {
                    const c = this.cursos.find(x => x.id === cursoId);
                    return c ? c.nombre : 'Curso #' + cursoId;
                }
            }
        }).component('nav-bar', NavBar).component('footer-bar', FooterBar).mount('#app');
    </script>
</body>
</html>
